<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#72D492"/>
      <stop offset="100%" stop-color="#3EBD6A"/>
    </linearGradient>
  </defs>

  <!-- Background square без скруглений -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Полоса 1: большая, верхняя -->
  <rect x="150" y="100" width="46" height="190" rx="23" fill="#AEEACB" transform="rotate(-35 173 195)"/>

  <!-- Полоса 2: малая, центр -->
  <rect x="233" y="235" width="46" height="80" rx="23" fill="#AEEACB" transform="rotate(-35 256 275)"/>

  <!-- Полоса 3: большая, нижняя -->
  <rect x="312" y="270" width="46" height="170" rx="23" fill="#AEEACB" transform="rotate(-35 335 355)"/>
</svg>
